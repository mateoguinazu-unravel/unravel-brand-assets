<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Unravel Signature</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #ffffff; padding: 20px; font-family: 'Albert Sans', Arial, sans-serif; }
  </style>
</head>
<body>

<!-- This page is intentionally bare — just the signature table for clean copy-paste into Gmail -->
<table id="sig-root" cellpadding="0" cellspacing="0" border="0" style="font-family:'Albert Sans',Arial,sans-serif;width:600px;max-width:600px;">
  <tr><td>
    <table cellpadding="0" cellspacing="0" border="0" style="width:600px;border-radius:16px;overflow:hidden;background-color:#1E0B42;background-image:radial-gradient(circle at 105% 115%,#FFD467 0%,#FF9040 18%,#FF7139 28%,rgba(82,57,237,0.5) 50%,transparent 65%),radial-gradient(circle at 95% 100%,#FF7139 0%,rgba(82,57,237,0.7) 35%,transparent 60%),radial-gradient(circle at 0% 0%,#0D0520 0%,#1A0742 40%,transparent 70%),linear-gradient(135deg,#0D0520 0%,#2A0E6E 30%,#5239ED 70%,#5239ED 100%);">
      <tr><td style="padding:28px;">
        <table cellpadding="0" cellspacing="0" border="0" style="width:100%;"><tr valign="top">

          <!-- LEFT -->
          <td style="width:370px;padding-right:24px;" valign="top">
            <table cellpadding="0" cellspacing="0" border="0" style="margin-bottom:20px;"><tr valign="middle">
              <td style="padding-right:16px;" valign="middle">
                <img id="out-avatar" src="" width="80" height="80" alt="" style="display:block;width:80px;height:80px;border-radius:50%;object-fit:cover;border:2px solid #FFFFFF;" />
              </td>
              <td valign="middle">
                <p id="out-name" style="font-size:18px;font-weight:700;color:#fff;line-height:1.3;margin:0 0 5px 0;font-family:'Albert Sans',Arial,sans-serif;"></p>
                <p id="out-title" style="font-size:15px;font-weight:400;color:rgba(255,255,255,0.80);margin:0;font-family:'Albert Sans',Arial,sans-serif;"></p>
              </td>
            </tr></table>
            <table cellpadding="0" cellspacing="0" border="0" style="margin-bottom:20px;">
              <tr id="out-phone-row"><td style="font-size:14px;color:#fff;font-family:'Albert Sans',Arial,sans-serif;padding-bottom:7px;line-height:1.5;">
                <a id="out-phone" href="#" style="color:#fff;text-decoration:none;"></a>
              </td></tr>
              <tr><td style="font-size:14px;color:#fff;font-family:'Albert Sans',Arial,sans-serif;line-height:1.5;">
                <a id="out-email" href="#" style="color:#fff;text-decoration:none;"></a>
              </td></tr>
            </table>
            <table cellpadding="0" cellspacing="0" border="0" style="margin-bottom:8px;"><tr><td>
              <img src="https://raw.githubusercontent.com/mateoguinazu-unravel/unravel-brand-assets/main/signature-logo.png" width="120" alt="Unravel" style="display:block;width:120px;height:auto;" />
            </td></tr></table>
            <table cellpadding="0" cellspacing="0" border="0"><tr><td style="font-size:14px;color:#fff;font-family:'Albert Sans',Arial,sans-serif;">
              <a href="https://www.unravelapp.com" style="color:#fff;text-decoration:none;">www.unravelapp.com</a>
            </td></tr></table>
          </td>

          <!-- RIGHT -->
          <td style="width:170px;" valign="top">
            <table cellpadding="0" cellspacing="0" border="0" style="width:170px;">
              <tr><td style="padding-bottom:8px;">
                <img src="https://raw.githubusercontent.com/mateoguinazu-unravel/unravel-brand-assets/488b33d5c20383d91fc933cad7bf4598a54e1d85/signature-img-03.png" width="170" alt="Apple Design Award" style="display:block;width:170px;height:auto;border-radius:14px;" />
              </td></tr>
              <tr><td style="padding-bottom:8px;">
                <img src="https://raw.githubusercontent.com/mateoguinazu-unravel/unravel-brand-assets/488b33d5c20383d91fc933cad7bf4598a54e1d85/signature-img-02.png" width="170" alt="Hot Travel Startups 2024" style="display:block;width:170px;height:auto;border-radius:14px;" />
              </td></tr>
              <tr><td>
                <img src="https://raw.githubusercontent.com/mateoguinazu-unravel/unravel-brand-assets/488b33d5c20383d91fc933cad7bf4598a54e1d85/signature-img-01.png" width="170" alt="Fastest Growing Travel Startup 2026" style="display:block;width:170px;height:auto;border-radius:14px;" />
              </td></tr>
            </table>
          </td>

        </tr></table>
      </td></tr>
    </table>
  </td></tr>
</table>

<script>
  const raw = sessionStorage.getItem('sig_data');
  if (!raw) {
    // No data — redirect back to the generator
    window.location.href = '/';
  } else {
    const d = JSON.parse(raw);
    document.getElementById('out-avatar').src = d.imgB64;
    document.getElementById('out-avatar').alt = d.name;
    document.getElementById('out-name').textContent = d.name;
    document.getElementById('out-title').textContent = d.title || '';
    if (d.full) {
      document.getElementById('out-phone').textContent = d.full;
      document.getElementById('out-phone').href = 'tel:' + d.full.replace(/\s/g, '');
    } else {
      document.getElementById('out-phone-row').style.display = 'none';
    }
    document.getElementById('out-email').textContent = d.email;
    document.getElementById('out-email').href = 'mailto:' + d.email;
  }
</script>
</body>
</html>
